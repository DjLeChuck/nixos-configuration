creation_rules:
  # Secrets specific to vm-home
  - path_regex: secrets/vm-home\.yaml$
    key_groups:
      - age:
          - *admin_djlechuck
          #- *host_home
          - *host_vm_home

  # Secrets specific to vm-work
  - path_regex: secrets/vm-work\.yaml$
    key_groups:
      - age:
          - *admin_djlechuck
          #- *host_work
          #- *host_vm_work

  # Secrets specific to home
  - path_regex: secrets/home\.yaml$
    key_groups:
      - age:
          - *admin_djlechuck
          #- *host_home

  # Secrets specific to work
  - path_regex: secrets/work\.yaml$
    key_groups:
      - age:
          - *admin_djlechuck
          #- *host_work

  # Secrets shared across multiple machines
  - path_regex: secrets/common\.yaml$
    key_groups:
      - age:
          - *admin_djlechuck
          #- *host_home
          #- *host_work
          - *host_vm_home
          #- *host_vm_work

  # OpenVPN3 work VPN configs (raw .ovpn files, sops binary format)
  - path_regex: secrets/vpn-work/.*\.ovpn$
    key_groups:
      - age:
          - *admin_djlechuck
          #- *host_home
          #- *host_work
          - *host_vm_home

  # WireGuard home VPN config (raw .conf file, sops binary format)
  - path_regex: secrets/vpn-home/.*\.conf$
    key_groups:
      - age:
          - *admin_djlechuck
          #- *host_work
          - *host_vm_home
          #- *host_vm_work
