keys:
  # Age key of the "home" machine (djlechuck-linux), used as the admin key
  # to edit all secrets. Retrieve it after the first rebuild with
  # `services.openssh` enabled:
  #   ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub
  - &host_home age1TODO_REPLACE_AFTER_REBUILD_HOME

  # Age key of the "vm-home" VM (djlechuck-vm-home)
  - &host_vm_home age1dqlmhrmkdvllf3xqcxpsxh95jtxndfa2m6jjymc8zy9cweew5g7svd45v7

  # Age key of the "vm-work" VM (djlechuck-vm-work)
  - &host_vm_work age1TODO_REPLACE_AFTER_REBUILD_VM_WORK

  # Age key of the future work machine (not created yet) - add it here once
  # the machine is provisioned and its first rebuild is done.
  # - &host_work_laptop age1TODO

creation_rules:
  # Secrets specific to vm-home
  - path_regex: secrets/vm-home\.yaml$
    key_groups:
      - age:
          - *host_home
          - *host_vm_home

  # Secrets specific to vm-work
  - path_regex: secrets/vm-work\.yaml$
    key_groups:
      - age:
          - *host_home
          - *host_vm_work

  # Secrets specific to home
  - path_regex: secrets/home\.yaml$
    key_groups:
      - age:
          - *host_home

  # Secrets shared across multiple machines
  - path_regex: secrets/common\.yaml$
    key_groups:
      - age:
          - *host_home
          - *host_vm_home
          - *host_vm_work
